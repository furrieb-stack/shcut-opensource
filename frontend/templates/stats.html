<!-- frontend/templates/stats.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shcut - Stats</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="app">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <span class="logo-text">shcut</span>
                    <span class="logo-dot">.</span>
                </div>
                <div class="nav-actions">
                    <button class="btn btn-outline" onclick="window.location.href='/'">Back to Dashboard</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="stats-header">
                <h1>Statistics for <span id="shortCode" class="accent"></span></h1>
                <div class="stats-actions">
                    <button class="btn btn-outline" onclick="copyStatsUrl()">Copy Stats URL</button>
                    <button class="btn btn-primary" onclick="visitUrl()">Visit URL</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalClicks">0</div>
                    <div class="stat-label">Total Clicks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="todayClicks">0</div>
                    <div class="stat-label">Today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="weekClicks">0</div>
                    <div class="stat-label">This Week</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="uniqueCountries">0</div>
                    <div class="stat-label">Countries</div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="clicksChart"></canvas>
            </div>

            <div class="stats-settings">
                <h2>URL Settings</h2>
                <div class="settings-form">
                    <div class="form-group">
                        <label>Blocked Countries</label>
                        <select id="blockedCountries" multiple class="countries-select">
                            <!-- Will be populated via JS -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Max Clicks (leave empty for unlimited)</label>
                        <input type="number" id="maxClicks" min="1">
                    </div>
                    <div class="form-group">
                        <label>Expires At</label>
                        <input type="datetime-local" id="expiresAt">
                    </div>
                    <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
                </div>
            </div>

            <div class="countries-stats">
                <h2>Clicks by Country</h2>
                <div class="countries-list" id="countriesList"></div>
            </div>

            <div class="recent-clicks">
                <h2>Recent Clicks</h2>
                <div class="clicks-table" id="recentClicks"></div>
            </div>
        </main>
    </div>
    <a id="originalUrl" style="display: none;"></a>
    <script src="/static/stats.js"></script>
</body>

</html>
